<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#142536"/>
      <stop offset="100%" stop-color="#0E1E2E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AF6A"/>
      <stop offset="100%" stop-color="#B8903F"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#C6A05B" stroke-width="1.5" opacity="0.25"/>
  <!-- Letter É — Cormorant Garamond inspired serif style -->
  <text
    x="256"
    y="310"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Georgia', 'Times New Roman', serif"
    font-weight="600"
    font-size="320"
    fill="url(#gold)"
    letter-spacing="-8"
  >É</text>
</svg>
